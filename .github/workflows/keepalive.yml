name: keepalive-supabase
on:
  schedule:
    - cron: '0 */6 * * *'   # toutes les 6 heures
  workflow_dispatch:         # + bouton manuel
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping base
        run: |
          curl -fsS "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON }}" > /dev/null
