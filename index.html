<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
:root{
  --bg:#F6F7F4; --surface:#FFFFFF; --ink:#1E2620; --muted:#69736D; --line:#E3E8E0;
  --accent:#2E7D5B; --accent-soft:#E5F0EA;
  --c-p:#2E7D5B; --c-g:#D9920A; --c-l:#4A6FA5; --c-f:#7E8F4B; --c-kcal:#1E2620;
  --over:#C0453A; --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:60px}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit;border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:var(--surface);width:100%}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
h1,h2,h3{font-weight:650;letter-spacing:-.01em}

/* header */
header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line)}
.head-in{max-width:1180px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:19px;font-weight:700;letter-spacing:-.02em}
.logo span{color:var(--accent)}
.save-state{font-size:12px;color:var(--muted);margin-left:auto}
nav{display:flex;gap:4px;max-width:1180px;margin:0 auto;padding:0 12px 10px;overflow-x:auto}
nav button{padding:7px 14px;border-radius:999px;font-weight:550;color:var(--muted);white-space:nowrap}
nav button.on{background:var(--ink);color:#fff}

main{max-width:1180px;margin:0 auto;padding:18px 16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.muted{color:var(--muted);font-size:13px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{background:var(--ink);color:#fff;border-radius:8px;padding:8px 14px;font-weight:550}
.btn.green{background:var(--accent)}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--ink)}
.btn.small{padding:4px 10px;font-size:13px}
.chip{padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:var(--surface);font-size:13px}
.chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}
.danger{color:var(--over)}

/* macro bars */
.bars{display:grid;gap:5px;margin-top:8px}
.bar-row{display:grid;grid-template-columns:18px 1fr 86px;gap:8px;align-items:center;font-size:12px}
.bar-row .lab{font-weight:700}
.track{height:7px;background:var(--bg);border-radius:99px;overflow:hidden;position:relative}
.fill{height:100%;border-radius:99px;transition:width .25s}
.val{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
.val b{color:var(--ink)}
.over .val b{color:var(--over)}

/* semaine */
.week-head{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.days{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.day h3{font-size:15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
.day h3 .kc{font-size:12px;color:var(--muted);font-weight:500}
.slot{border-top:1px solid var(--line);padding:7px 0}
.slot-head{display:flex;justify-content:space-between;align-items:center}
.slot-name{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700}
.slot-prot{font-size:11px;color:var(--muted)}
.add-slot{color:var(--accent);font-weight:700;font-size:17px;line-height:1;padding:2px 7px;border-radius:6px}
.add-slot:hover{background:var(--accent-soft)}
.item{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:5px 8px;margin-top:5px;background:var(--bg);border-radius:8px;font-size:13.5px}
.item .x{color:var(--muted);padding:0 4px;font-size:15px}
.item .x:hover{color:var(--over)}
.item .pm{font-size:11.5px;color:var(--muted);white-space:nowrap}
.item.clickable{cursor:pointer;transition:background .12s}
.item.clickable:hover{background:var(--accent-soft)}

/* recettes */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.toolbar input[type=search]{max-width:260px}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:12px}
.rec-card{cursor:pointer;transition:border-color .15s}
.rec-card:hover{border-color:var(--accent)}
.rec-card h3{font-size:15px;margin:2px 0 6px}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--bg);color:var(--muted);font-weight:600}
.badge.cong{background:#E8F1FA;color:#3A6EA8}
.macroline{display:flex;gap:10px;font-size:12.5px;font-variant-numeric:tabular-nums;color:var(--muted)}
.macroline b{color:var(--ink);font-size:14px}
.mp{color:var(--c-p)}.mg{color:var(--c-g)}.ml{color:var(--c-l)}.mf{color:var(--c-f)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:8px 8px;border-bottom:1px solid var(--line)}
td{padding:8px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:none}
.tnum{text-align:right}
th.tnum{text-align:right}

/* courses */
.course-group{margin-bottom:16px}
.course-group h3{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.course-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface);border:1px solid var(--line);border-radius:8px;margin-bottom:5px}
.course-item input{width:18px;height:18px;accent-color:var(--accent)}
.course-item.done{opacity:.45;text-decoration:line-through}
.course-item .qty{margin-left:auto;color:var(--muted);font-size:13px;white-space:nowrap;font-variant-numeric:tabular-nums}

/* objectifs */
.obj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.bigval{font-size:26px;font-weight:700;letter-spacing:-.02em}
.bigval small{font-size:13px;color:var(--muted);font-weight:500}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(20,28,22,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.overlay{align-items:center}}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;padding:18px}
@media(min-width:640px){.modal{border-radius:16px}}
.modal h2{font-size:18px;margin-bottom:10px;padding-right:30px}
.modal-close{position:absolute;font-size:22px;color:var(--muted);padding:4px 10px}
.modal-wrap{position:relative}
.modal-close{top:8px;right:8px}
.ing-row{display:grid;grid-template-columns:1fr 86px 30px;gap:6px;margin-bottom:6px;align-items:center}
.list-pick{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.pick-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;text-align:left}
.pick-item:hover{border-color:var(--accent);background:var(--accent-soft)}
.pick-item .pm{font-size:12px;color:var(--muted)}
.steps li{margin:0 0 6px 18px}
.detail-macros{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:10px 0;text-align:center}
.dm{background:var(--bg);border-radius:8px;padding:8px 4px}
.dm b{display:block;font-size:16px}
.dm span{font-size:11px;color:var(--muted)}
.empty{padding:28px;text-align:center;color:var(--muted)}
.hr{border:none;border-top:1px solid var(--line);margin:12px 0}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <div class="logo">Ma <span>Diète</span></div>
    <div class="save-state" id="saveState"></div>

    <button class="btn ghost small" onclick="document.getElementById('importFile').click()">Importer</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)">
  </div>
  <nav id="nav"></nav>
</header>
<main id="main"></main>
<div id="modalRoot"></div>

async function cloudPushNow(){

async function cloudPull(){
  setSaveState('Synchronisation…');
  let row=null, err=null;
  try{ const res = await sb.from('profiles').select('data').eq('id', cloudUser.id).maybeSingle(); row=res.data; err=res.error; }
  catch(e){ err=e; }
  if(err){
    setSaveState('Cloud : erreur');
    alert("Lecture cloud impossible : "+(err.message||err)+"\n\nAs-tu exécuté le script SQL (table « profiles » + règles RLS) dans Supabase ?");
    return;
  }
  if(row && row.data){
    mergeFromCloud(migrate(row.data));
  }
  const ok = await cloudPushNow();              // converge les deux côtés
  setSaveState(ok ? 'Synchronisé ☁︎ ✓' : 'Local ✓ · cloud à réessayer');
}
// Synchro d'un compte : le cloud fait autorité (les MODIFICATIONS se propagent),
// mais on conserve les ajouts purement locaux (par nom) que le cloud ne connaît pas encore.
function mergeFromCloud(remote){
  const rIng = remote.ingredients || [];
  const rRec = remote.recettes || [];
  const rIngNames = new Set(rIng.map(i=>nameKey(i.nom)));
  const rRecNames = new Set(rRec.map(r=>nameKey(r.nom)));
  const localOnlyIng = state.ingredients.filter(i=>!rIngNames.has(nameKey(i.nom)));
  const localOnlyRec = state.recettes.filter(r=>!rRecNames.has(nameKey(r.nom)));
  state.ingredients = rIng.concat(localOnlyIng);
  state.recettes    = rRec.concat(localOnlyRec);
  if(remote.plan) state.plan = remote.plan;
  if(remote.objectifs) state.objectifs = remote.objectifs;
  if(remote.pesees) state.pesees = remote.pesees;
  if(remote.checked) state.checked = remote.checked;
}

  if(!email || !password) return alert('Email et mot de passe requis.');
  let res; try{ res = await sb.auth.signUp({ email, password }); }catch(e){ return alert('Erreur réseau : '+e); }
  if(res.error) return alert('Inscription : '+res.error.message);
  if(res.data && res.data.session){ cloudUser = res.data.user; await cloudPull(); render(); }
  else alert("Compte créé. Si la confirmation par email est activée côté Supabase, valide le lien reçu puis connecte-toi (ou désactive « Confirm email » dans Authentication → Providers → Email).");
}
async function cloudSignIn(){
  const email=val('cE'), password=val('cP');
  if(!email || !password) return alert('Email et mot de passe requis.');
  let res; try{ res = await sb.auth.signInWithPassword({ email, password }); }catch(e){ return alert('Erreur réseau : '+e); }
  if(res.error) return alert('Connexion : '+res.error.message);
  cloudUser = res.data.user; await cloudPull(); render();
}
async function cloudSignOut(){ try{ await sb.auth.signOut(); }catch(e){} cloudUser=null; setSaveState('Déconnecté'); render(); }
async function cloudRestore(){
  if(!sb) return;
  try{ const { data } = await sb.auth.getSession(); if(data && data.session){ cloudUser = data.session.user; await cloudPull(); } }catch(e){}
}

// ---------------- helpers ----------------
const ingById = id => state.ingredients.find(i=>i.id===id);
const recById = id => state.recettes.find(r=>r.id===id);
const fmt = (n,d=0) => (Math.round(n*10**d)/10**d).toLocaleString('fr-FR');
function slug(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'') || 'item'; }
function uid(base, list){ let id = slug(base), n=2; while(list.some(x=>x.id===id)) id = slug(base)+'_'+(n++); return id; }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function kcal100(m){ return m.proteines*4 + m.glucides*4 + m.lipides*9 + (m.fibres||0)*2; }
function recTotals(rec){
  const t = {kcal:0, p:0, g:0, l:0, f:0};
  rec.ingredients.forEach(it=>{
    const ing = ingById(it.ingredient_id); if(!ing) return;
    const m = ing.macros_pour_100g, x = it.quantite_g/100;
    t.kcal += kcal100(m)*x; t.p += m.proteines*x; t.g += m.glucides*x; t.l += m.lipides*x; t.f += m.fibres*x;
  });
  return t;
}
function recPerPortion(rec){
  const t = recTotals(rec), p = rec.portions || 1;
  return {kcal:t.kcal/p, p:t.p/p, g:t.g/p, l:t.l/p, f:t.f/p};
}
function dayTotals(w, d){
  const t = {kcal:0,p:0,g:0,l:0,f:0};
  SLOTS.forEach(s=>{
    (state.plan[w][d][s.id]||[]).forEach(it=>{
      const rec = recById(it.rid); if(!rec) return;
      const m = recPerPortion(rec);
      t.kcal+=m.kcal*it.portions; t.p+=m.p*it.portions; t.g+=m.g*it.portions; t.l+=m.l*it.portions; t.f+=m.f*it.portions;
    });
  });
  return t;
}
function targets(){
  const o = state.objectifs;
  const gluc = Math.max(0, (o.kcal - o.prot*4 - o.lip*9)/4);
  return {kcal:o.kcal, p:o.prot, g:gluc, l:o.lip, f:o.fibres};
}
function macroLine(m){
  return `<div class="macroline"><span><b>${fmt(m.kcal)}</b> kcal</span>`+
    `<span class="mp"><b>${fmt(m.p)}</b>P</span><span class="mg"><b>${fmt(m.g)}</b>G</span>`+
    `<span class="ml"><b>${fmt(m.l)}</b>L</span><span class="mf"><b>${fmt(m.f)}</b>F</span></div>`;
}
function bars(t, tg){
  const rows = [['kcal','kcal',t.kcal,tg.kcal,'var(--c-kcal)'],['P','p',t.p,tg.p,'var(--c-p)'],
    ['G','g',t.g,tg.g,'var(--c-g)'],['L','l',t.l,tg.l,'var(--c-l)'],['F','f',t.f,tg.f,'var(--c-f)']];
  return '<div class="bars">'+rows.map(([lab,,v,goal,col])=>{
    const pct = Math.min(100, goal? v/goal*100 : 0);
    const over = goal && v > goal*1.05;
    return `<div class="bar-row ${over?'over':''}"><span class="lab" style="color:${col}">${lab}</span>
      <div class="track"><div class="fill" style="width:${pct}%;background:${over?'var(--over)':col}"></div></div>
      <span class="val"><b>${fmt(v)}</b> / ${fmt(goal)}</span></div>`;
  }).join('')+'</div>';
}

// ---------------- nav / render ----------------
const VIEWS = [['semaine','Semaine'],['recettes','Recettes'],['ingredients','Ingrédients'],['courses','Courses'],['poids','Poids'],['objectifs','Objectifs'],['compte','Compte']];
function renderNav(){
  document.getElementById('nav').innerHTML = VIEWS.map(([id,nom])=>
    `<button class="${view===id?'on':''}" onclick="go('${id}')">${nom}</button>`).join('');
}
function go(v){ view=v; render(); }
function render(){
  renderNav();
  const m = document.getElementById('main');
  if(view==='semaine') m.innerHTML = vSemaine();
  else if(view==='recettes'){ m.innerHTML = vRecettes(); filterRecCards(); }
  else if(view==='ingredients'){ m.innerHTML = vIngredients(); filterIngRows(); }
  else if(view==='courses') m.innerHTML = vCourses();
  else if(view==='poids') m.innerHTML = vPoids();
  else if(view==='compte') m.innerHTML = vCompte();
  else m.innerHTML = vObjectifs();
}

// ---------------- vue Semaine ----------------
function weekList(){ return Object.keys(state.plan).map(Number).sort((a,b)=>a-b); }
function vSemaine(){
  const weeks = weekList();
  if(!weeks.includes(week)) week = weeks[0];
  const tg = targets();
  let weekT = {kcal:0,p:0,g:0,l:0,f:0};
  let html = `<div class="week-head">
    ${weeks.map(w=>`<button class="chip ${week===w?'on':''}" onclick="week=${w};render()">Semaine ${w}</button>`).join('')}
    <button class="chip" onclick="addWeek()" title="Ajouter une semaine">+ semaine</button>
    ${weeks.length>1?`<button class="chip danger" onclick="removeWeek()" title="Supprimer la semaine affichée">− supprimer S${week}</button>`:''}
    <span class="muted">Touchez + pour placer une recette sur un repas.</span>
  </div><div class="days">`;
  for(let d=0; d<7; d++){
    const t = dayTotals(week, d);
    ['kcal','p','g','l','f'].forEach(k=>weekT[k]+=t[k]);
    html += `<div class="card day"><h3>${JOURS[d]} <span class="kc">${fmt(t.kcal)} / ${fmt(tg.kcal)} kcal</span></h3>`;
    SLOTS.forEach(s=>{
      const items = state.plan[week][d][s.id]||[];
      html += `<div class="slot"><div class="slot-head">
        <span class="slot-name">${s.nom} <span class="slot-prot">· cible ${state.objectifs.split[s.id]||0} g prot</span></span>
        <button class="add-slot" aria-label="Ajouter ${s.nom} ${JOURS[d]}" onclick="openPicker(${d},'${s.id}')">+</button></div>`;
      items.forEach((it,idx)=>{
        const rec = recById(it.rid); if(!rec) return;
        const m = recPerPortion(rec);
        html += `<div class="item clickable" role="button" tabindex="0" onclick="openRecDetail('${it.rid}')" onkeydown="if(event.key==='Enter')openRecDetail('${it.rid}')">
          <span>${esc(rec.nom)}${it.portions!==1?` <b>×${it.portions}</b>`:''}</span>
          <span class="pm">${fmt(m.kcal*it.portions)} kcal · ${fmt(m.p*it.portions)}P</span>
          <button class="x" onclick="event.stopPropagation();removeItem(${d},'${s.id}',${idx})" aria-label="Retirer">×</button></div>`;
      });
      html += `</div>`;
    });
    html += bars(t, tg) + `</div>`;
  }
  html += `</div><div class="card" style="margin-top:14px"><h3 style="margin-bottom:4px">Total semaine ${week}</h3>
    <div class="muted">Moyenne / jour : ${fmt(weekT.kcal/7)} kcal · ${fmt(weekT.p/7)} g protéines · ${fmt(weekT.f/7)} g fibres</div></div>`;
  return html;
}
function removeItem(d, slot, idx){ state.plan[week][d][slot].splice(idx,1); save(); render(); }
function addWeek(){
  const n = Math.max(...weekList()) + 1;
  state.plan[n] = emptyWeek();
  week = n; save(); render();
}
function removeWeek(){
  if(weekList().length <= 1) return;
  const n = SLOTS.reduce((a,s)=>a+Object.values(state.plan[week]).reduce((b,d)=>b+(d[s.id]||[]).length,0),0);
  if(n && !confirm(`Supprimer la semaine ${week} et ses ${n} repas planifiés ?`)) return;
  delete state.plan[week];
  delete courseWeeks[week];
  week = weekList()[0]; save(); render();
}

function openPicker(d, slot){
  const list = state.recettes.slice().sort((a,b)=>a.nom.localeCompare(b.nom,'fr')).map(r=>{
    const m = recPerPortion(r);
    return {r, m};
  });
  modal(`<h2>Ajouter — ${JOURS[d]}, ${SLOTS.find(s=>s.id===slot).nom}</h2>
    <div class="row"><input type="search" id="pickSearch" placeholder="Chercher une recette…" oninput="filterPick()">
    <span style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)">Portions
    <input type="number" id="pickPortions" value="1" min="0.5" step="0.5" style="width:70px"></span></div>
    <div class="list-pick" id="pickList">${list.map(({r,m})=>
      `<button class="pick-item" data-name="${esc(r.nom.toLowerCase())}" onclick="pick(${d},'${slot}','${r.id}')">
        <span>${esc(r.nom)}</span><span class="pm">${fmt(m.kcal)} kcal · ${fmt(m.p)}P / portion</span></button>`).join('')}</div>`);
  document.getElementById('pickSearch').focus();
}
function filterPick(){
  const q = document.getElementById('pickSearch').value.toLowerCase();
  document.querySelectorAll('#pickList .pick-item').forEach(el=>{
    el.style.display = el.dataset.name.includes(q) ? '' : 'none';
  });
}
function pick(d, slot, rid){
  const p = parseFloat(document.getElementById('pickPortions').value)||1;
  state.plan[week][d][slot].push({rid, portions:p});
  closeModal(); save(); render();
}

function vRecettes(){
  const cats = ['Toutes', ...new Set(state.recettes.map(r=>r.categorie))];
  const list = state.recettes.filter(r=>recFilter==='Toutes'||r.categorie===recFilter)
    .sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));
  return `<div class="toolbar">
    <input type="search" id="recSearch" placeholder="Chercher…" value="${esc(recSearch)}" oninput="recSearch=this.value;filterRecCards()">
    ${cats.map(c=>`<button class="chip ${recFilter===c?'on':''}" onclick="recFilter='${c}';render()">${c}</button>`).join('')}
    <button class="btn green" style="margin-left:auto" onclick="openRecForm()">+ Nouvelle recette</button>
  </div>
  <div class="rec-grid" id="recGrid">${list.map(r=>{
    const m = recPerPortion(r);
    return `<div class="card rec-card" data-name="${esc(r.nom.toLowerCase())}" onclick="openRecDetail('${r.id}')">
      <div class="badges"><span class="badge">${esc(r.categorie)}</span>
      ${r.congelable?'<span class="badge cong">❄ congelable</span>':''}
      <span class="badge">${r.portions} portion${r.portions>1?'s':''}</span></div>
      <h3>${esc(r.nom)}</h3>${macroLine(m)}<div class="muted" style="margin-top:4px">par portion</div></div>`;
  }).join('')}</div>
  <div class="empty" id="recEmpty" style="display:none">Aucune recette ne correspond.</div>`;
}
function filterRecCards(){
  const grid = document.getElementById('recGrid'); if(!grid) return;
  const q = recSearch.toLowerCase();
  let shown = 0;
  grid.querySelectorAll('.rec-card').forEach(el=>{
    const ok = el.dataset.name.includes(q);
    el.style.display = ok ? '' : 'none';
    if(ok) shown++;
  });
  const e = document.getElementById('recEmpty');
  if(e) e.style.display = shown ? 'none' : '';
}
function openRecDetail(id){

  modal(`<h2>${esc(r.nom)}</h2>
    <div class="badges"><span class="badge">${esc(r.categorie)}</span>${r.congelable?'<span class="badge cong">❄ congelable</span>':''}
    <span class="badge">${r.portions} portion${r.portions>1?'s':''}</span>${(r.tags||[]).map(t=>`<span class="badge">${esc(t)}</span>`).join('')}</div>
    <div class="detail-macros">
      <div class="dm"><b>${fmt(m.kcal)}</b><span>kcal</span></div>
      <div class="dm"><b class="mp">${fmt(m.p)}</b><span>prot</span></div>
      <div class="dm"><b class="mg">${fmt(m.g)}</b><span>gluc</span></div>
      <div class="dm"><b class="ml">${fmt(m.l)}</b><span>lip</span></div>
      <div class="dm"><b class="mf">${fmt(m.f)}</b><span>fibres</span></div>
    </div>
    <div class="muted">par portion — total recette : ${fmt(t.kcal)} kcal · ${fmt(t.p)}P · ${fmt(t.g)}G · ${fmt(t.l)}L · ${fmt(t.f)}F</div>
    <hr class="hr"><h3 style="font-size:14px;margin-bottom:6px">Ingrédients (pesés crus, pour ${r.portions} portion${r.portions>1?'s':''})</h3>
    <table><tbody>${r.ingredients.map(it=>{
      const ing = ingById(it.ingredient_id);
      return `<tr><td>${ing?esc(ing.nom):it.ingredient_id}</td><td class="tnum">${fmt(it.quantite_g)} g</td></tr>`;
    }).join('')}</tbody></table>
    ${r.etapes && r.etapes.length ? `<hr class="hr"><h3 style="font-size:14px;margin-bottom:6px">Préparation</h3><ol class="steps">${r.etapes.map(e=>`<li>${esc(e)}</li>`).join('')}</ol>`:''}
    <hr class="hr"><div class="row">
      <button class="btn ghost" onclick="openRecForm('${r.id}')">Modifier</button>
      <button class="btn ghost danger" onclick="deleteRec('${r.id}')">Supprimer</button>
    </div>`);
}
function deleteRec(id){
  if(!confirm('Supprimer cette recette ? Elle sera aussi retirée du planning.')) return;
  state.recettes = state.recettes.filter(r=>r.id!==id);
  [1,2].forEach(w=>{ for(let d=0;d<7;d++) SLOTS.forEach(s=>{
    state.plan[w][d][s.id] = state.plan[w][d][s.id].filter(it=>it.rid!==id); }); });
  closeModal(); save(); render();
}

  const r = id ? recById(id) : null;

  modal(`<h2>${r?'Modifier':'Nouvelle'} recette</h2>

    <div class="row">

        <select id="fCat">${['Plat','Petit-déjeuner','Goûter','Collation','Accompagnement'].map(c=>
          `<option ${r&&r.categorie===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="field" style="width:110px"><label>Portions</label><input id="fPort" type="number" min="1" step="1" value="${r?r.portions:4}"></div>
      <div class="field" style="width:130px"><label>Congelable</label>
        <select id="fCong"><option value="1" ${r&&r.congelable?'selected':''}>Oui</option><option value="0" ${r&&!r.congelable?'selected':''}>Non</option></select></div>
    </div>
    <div class="field"><label>Tags (séparés par des virgules)</label><input id="fTags" value="${r?esc((r.tags||[]).join(', ')):''}"></div>
    <div class="field"><label>Ingrédients (grammes, pesés crus)</label><div id="fIngs"></div>
      <button class="btn ghost small" onclick="formIngs.push({ingredient_id:'',quantite_g:100});renderFormIngs()">+ Ajouter un ingrédient</button></div>
    <div class="field"><label>Étapes (une par ligne)</label><textarea id="fSteps" rows="4">${r?esc((r.etapes||[]).join('\n')):''}</textarea></div>
    <div class="row"><button class="btn green" onclick="saveRec(${r?`'${r.id}'`:'null'})">Enregistrer</button>
    <button class="btn ghost" onclick="closeModal()">Annuler</button></div>`);
  renderFormIngs();
}
function renderFormIngs(){
  const opts = state.ingredients.slice().sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));
  document.getElementById('fIngs').innerHTML = formIngs.map((it,i)=>
    `<div class="ing-row">
      <select onchange="formIngs[${i}].ingredient_id=this.value">
        <option value="">— choisir —</option>
        ${opts.map(o=>`<option value="${o.id}" ${it.ingredient_id===o.id?'selected':''}>${esc(o.nom)}</option>`).join('')}
      </select>
      <input type="number" min="1" value="${it.quantite_g}" onchange="formIngs[${i}].quantite_g=parseFloat(this.value)||0">
      <button class="x" onclick="formIngs.splice(${i},1);renderFormIngs()" aria-label="Retirer">×</button>
    </div>`).join('');
}
function saveRec(id){
  const nom = document.getElementById('fNom').value.trim();
  if(!nom) return alert('Donnez un nom à la recette.');
  const ings = formIngs.filter(i=>i.ingredient_id && i.quantite_g>0);
  if(!ings.length) return alert('Ajoutez au moins un ingrédient.');
  const data = {
    nom, categorie: document.getElementById('fCat').value,
    portions: Math.max(1, parseInt(document.getElementById('fPort').value)||1),
    congelable: document.getElementById('fCong').value==='1',
    tags: document.getElementById('fTags').value.split(',').map(s=>s.trim()).filter(Boolean),
    ingredients: ings,
    etapes: document.getElementById('fSteps').value.split('\n').map(s=>s.trim()).filter(Boolean),
  };
  if(id){ Object.assign(recById(id), data); }
  else { state.recettes.push({id: uid(nom, state.recettes), ...data}); }
  closeModal(); save(); recFilter='Toutes'; view='recettes'; render();
}

  const k = kcal100({proteines:v('iP'), glucides:v('iG'), lipides:v('iL'), fibres:v('iF')});
  document.getElementById('iKcalCalc').textContent = fmt(k,1);
}
function saveIng(id){
  const nom = document.getElementById('iNom').value.trim();
  if(!nom) return alert('Donnez un nom.');
  const num = x => parseFloat(document.getElementById(x).value)||0;
  const macros = {proteines:num('iP'), glucides:num('iG'), lipides:num('iL'), fibres:num('iF')};
  macros.kcal = Math.round(kcal100(macros)*10)/10;
  const data = {
    nom, categorie: document.getElementById('iCat').value.trim()||'Épicerie',
    rayon: document.getElementById('iRayon').value.trim()||'Épicerie',
    poids_unitaire_g: num('iUnit')||null,
    macros_pour_100g: macros,
  };
  if(id){ Object.assign(ingById(id), data); }
  else { state.ingredients.push({id: uid(nom, state.ingredients), ...data}); }
  closeModal(); save(); render();
}

// ---------------- vue Courses ----------------
let courseWeeks = {1:true};
function vCourses(){
  const weeks = weekList();
  const agg = {}; // ingId -> grams
  weeks.forEach(w=>{ if(!courseWeeks[w]) return;
    for(let d=0;d<7;d++) SLOTS.forEach(s=>{
      state.plan[w][d][s.id].forEach(it=>{
        const rec = recById(it.rid); if(!rec) return;
        const ratio = it.portions / (rec.portions||1);
        rec.ingredients.forEach(ri=>{ agg[ri.ingredient_id] = (agg[ri.ingredient_id]||0) + ri.quantite_g*ratio; });
      });
    });
  });
  const byRayon = {};
  Object.entries(agg).forEach(([id,g])=>{
    const ing = ingById(id); if(!ing) return;
    (byRayon[ing.rayon] = byRayon[ing.rayon]||[]).push({ing, g});
  });
  const rayons = Object.keys(byRayon).sort((a,b)=>a.localeCompare(b,'fr'));
  let html = `<div class="toolbar">
    ${weeks.map(w=>`<button class="chip ${courseWeeks[w]?'on':''}" onclick="courseWeeks[${w}]=!courseWeeks[${w}];render()">Semaine ${w}</button>`).join('')}
    <span class="muted">Quantités cumulées depuis le planning (pesé cru).</span>
    <button class="btn ghost small" style="margin-left:auto" onclick="state.checked={};save();render()">Tout décocher</button></div>`;
  if(!rayons.length) return html + `<div class="card empty">Placez des recettes dans le planning pour générer la liste de courses.</div>`;
  rayons.forEach(r=>{
    html += `<div class="course-group"><h3>${esc(r)}</h3>`;
    byRayon[r].sort((a,b)=>a.ing.nom.localeCompare(b.ing.nom,'fr')).forEach(({ing,g})=>{
      const done = !!state.checked[ing.id];
      const unit = ing.poids_unitaire_g ? ` · ≈ ${Math.ceil(g/ing.poids_unitaire_g)} u.` : '';
      html += `<label class="course-item ${done?'done':''}">
        <input type="checkbox" ${done?'checked':''} onchange="state.checked['${ing.id}']=this.checked;save();render()">
        <span>${esc(ing.nom)}</span><span class="qty">${fmt(g)} g${unit}</span></label>`;
    });
    html += `</div>`;
  });
  return html;
}

// ---------------- vue Poids ----------------
function frDate(iso){ const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; }
function vPoids(){
  const ps = (state.pesees||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const today = new Date().toISOString().slice(0,10);
  const last = ps[ps.length-1];
  const first = ps[0];
  const delta = ps.length>=2 ? last.poids - first.poids : 0;
  return `<div class="card" style="margin-bottom:12px"><h3 style="margin-bottom:10px">Nouvelle pesée</h3>
    <div class="row">
      <div class="field" style="flex:1;min-width:150px;margin-bottom:0"><label>Date</label><input type="date" id="pDate" value="${today}"></div>
      <div class="field" style="flex:1;min-width:120px;margin-bottom:0"><label>Poids (kg)</label><input type="number" id="pPoids" step="0.1" min="30" value="${last?last.poids:state.objectifs.poids}"></div>
      <button class="btn green" style="align-self:flex-end" onclick="addPesee()">Ajouter</button>
    </div>
    <p class="muted" style="margin-top:8px">Astuce : pesez-vous toujours dans les mêmes conditions (le matin, à jeun).</p></div>
  <div class="card" style="margin-bottom:12px">
    <h3 style="margin-bottom:4px">Évolution</h3>
    ${last?`<div class="muted" style="margin-bottom:8px">Dernière pesée : <b>${fmt(last.poids,1)} kg</b> le ${frDate(last.date)}
      ${ps.length>=2?` · <b style="color:${delta<=0?'var(--accent)':'var(--c-g)'}">${delta>0?'+':''}${fmt(delta,1)} kg</b> depuis le ${frDate(first.date)}`:''}
      · référence objectifs : ${state.objectifs.poids} kg
      <button class="btn ghost small" onclick="state.objectifs.poids=${last?last.poids:0};save();render()">Utiliser comme référence</button></div>`:''}
    ${ps.length>=2 ? poidsChart(ps) : '<div class="empty">Ajoutez au moins deux pesées pour afficher la courbe.</div>'}</div>
  ${ps.length?`<div class="card"><table><thead><tr><th>Date</th><th class="tnum">Poids</th><th></th></tr></thead><tbody>
    ${ps.slice().reverse().map(p=>`<tr><td>${frDate(p.date)}</td><td class="tnum">${fmt(p.poids,1)} kg</td>
      <td style="text-align:right"><button class="x" onclick="delPesee('${p.date}')" aria-label="Supprimer">×</button></td></tr>`).join('')}
  </tbody></table></div>`:''}`;
}
function addPesee(){
  const date = document.getElementById('pDate').value;
  const poids = parseFloat(document.getElementById('pPoids').value);
  if(!date || !poids || poids<=0) return alert('Renseignez une date et un poids valides.');
  state.pesees = state.pesees||[];
  const ex = state.pesees.find(p=>p.date===date);
  if(ex) ex.poids = poids; else state.pesees.push({date, poids});
  save(); render();
}
function delPesee(date){
  state.pesees = state.pesees.filter(p=>p.date!==date);
  save(); render();
}
function poidsChart(ps){
  const W=640, H=250, P={l:44, r:14, t:16, b:28};
  const xs = ps.map(p=>new Date(p.date).getTime());
  const obj = state.objectifs.poids;
  const allY = ps.map(p=>p.poids).concat([obj]);
  let ymin = Math.min(...allY)-1, ymax = Math.max(...allY)+1;
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  const X = t => P.l + (x1===x0 ? 0.5 : (t-x0)/(x1-x0)) * (W-P.l-P.r);
  const Y = v => H-P.b - (v-ymin)/(ymax-ymin) * (H-P.t-P.b);
  let grid='';
  for(let i=0;i<=4;i++){
    const v = ymin+(ymax-ymin)*i/4, y = Y(v);
    grid += `<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#E3E8E0"/>`+
      `<text x="${P.l-6}" y="${y+4}" text-anchor="end" font-size="11" fill="#69736D">${fmt(v,1)}</text>`;
  }
  const pts = ps.map(p=>`${X(new Date(p.date).getTime()).toFixed(1)},${Y(p.poids).toFixed(1)}`).join(' ');
  const dots = ps.map(p=>`<circle cx="${X(new Date(p.date).getTime()).toFixed(1)}" cy="${Y(p.poids).toFixed(1)}" r="3.5" fill="#2E7D5B"><title>${frDate(p.date)} — ${fmt(p.poids,1)} kg</title></circle>`).join('');
  const yObj = Y(obj);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" role="img" aria-label="Courbe de poids">${grid}
    <line x1="${P.l}" y1="${yObj}" x2="${W-P.r}" y2="${yObj}" stroke="#D9920A" stroke-dasharray="5 4"/>
    <text x="${W-P.r}" y="${yObj-5}" text-anchor="end" font-size="11" fill="#D9920A">référence ${fmt(obj,1)} kg</text>
    <polyline points="${pts}" fill="none" stroke="#2E7D5B" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${P.l}" y="${H-8}" font-size="11" fill="#69736D">${frDate(ps[0].date)}</text>
    <text x="${W-P.r}" y="${H-8}" text-anchor="end" font-size="11" fill="#69736D">${frDate(ps[ps.length-1].date)}</text></svg>`;
}

// ---------------- export / import ----------------
function download(text, filename){
  const blob = new Blob([text], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click(); URL.revokeObjectURL(a.href);
}
function exportJSON(){ download(JSON.stringify(state, null, 2), 'ma-diete-sauvegarde.json'); }
function exportLibrary(){
  download(JSON.stringify({type:'ma-diete-bibliotheque', ingredients: state.ingredients, recettes: state.recettes}, null, 2),
    'ma-diete-recettes.json');
}

// signature "ligne identique" = nom normalisé (un aliment / une recette = son nom)
function nameKey(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim(); }

// Fusion : ignore les lignes déjà présentes (même nom), ajoute les nouvelles, n'écrase rien.
function mergeLibrary(incoming){
  const inIngs = incoming.ingredients || [];
  const inRecs = incoming.recettes || [];
  const curByName = new Map(state.ingredients.map(i=>[nameKey(i.nom), i]));
  const curById   = new Map(state.ingredients.map(i=>[i.id, i]));
  const idMap = {}; // id entrant -> id retenu dans la bibliothèque actuelle
  let addedIng=0, skippedIng=0;
  inIngs.forEach(inc=>{
    const k = nameKey(inc.nom);
    const ex = curByName.get(k);
    if(ex){ idMap[inc.id] = ex.id; skippedIng++; return; }       // déjà présent -> ignoré (pas d'écrasement)
    let nid = inc.id;
    if(curById.has(nid)) nid = uid(inc.nom, state.ingredients);  // collision d'id sur contenu différent
    const obj = {...inc, id:nid};
    state.ingredients.push(obj); curByName.set(k,obj); curById.set(nid,obj);
    idMap[inc.id] = nid; addedIng++;
  });
  const curRecNames = new Set(state.recettes.map(r=>nameKey(r.nom)));
  let addedRec=0, skippedRec=0;
  inRecs.forEach(inc=>{
    if(curRecNames.has(nameKey(inc.nom))){ skippedRec++; return; } // recette déjà présente -> ignorée
    const ings = (inc.ingredients||[]).map(it=>({
      ingredient_id: idMap[it.ingredient_id] || it.ingredient_id, // ré-aiguille vers l'id local
      quantite_g: it.quantite_g
    }));
    let nid = inc.id;
    if(state.recettes.some(r=>r.id===nid)) nid = uid(inc.nom, state.recettes);
    state.recettes.push({...inc, id:nid, ingredients:ings});
    curRecNames.add(nameKey(inc.nom)); addedRec++;
  });
  return {addedIng, addedRec, skippedIng, skippedRec};
}

function importJSON(input){
  const f = input.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    let d;
    try{ d = JSON.parse(reader.result); }
    catch(e){ return alert("Fichier illisible (JSON invalide)."); }
    if(!d.ingredients && !d.recettes) return alert("Ce fichier ne contient ni ingrédients ni recettes.");
    if(d.plan){ // sauvegarde complète : restaurer tout, ou seulement fusionner la bibliothèque
      const replace = confirm(
        "Ce fichier est une sauvegarde complète.\n\n"+
        "• OK : tout remplacer (planning, objectifs, poids inclus).\n"+
        "• Annuler : ne fusionner que les recettes et ingrédients (sans rien écraser).");
      if(replace){ state = migrate(d); save(); render(); return alert("Sauvegarde restaurée."); }
    }
    const r = mergeLibrary(d);
    save(); render(); setSaveState('Fusion ✓');
    alert(`Fusion terminée :\n+ ${r.addedIng} ingrédient(s) et + ${r.addedRec} recette(s) ajoutés.\n`+
          `${r.skippedIng + r.skippedRec} doublon(s) déjà présent(s), ignoré(s).`);
  };
  reader.readAsText(f); input.value='';
}
